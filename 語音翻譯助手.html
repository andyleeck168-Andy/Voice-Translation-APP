<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>🌍 語音翻譯助手 - 線上翻譯版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
            background: linear-gradient(180deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 12px; padding-bottom: 50px; }
        
        .header { text-align: center; padding: 12px 0 8px; }
        .header h1 { font-size: 26px; font-weight: 800; margin-bottom: 4px; letter-spacing: 1px; }
        .header p { font-size: 14px; color: #90e0ef; }
        
        .mode-switch {
            display: flex;
            background: rgba(255,255,255,0.08);
            border-radius: 50px;
            padding: 4px;
            margin: 12px 0;
        }
        .mode-btn {
            flex: 1;
            padding: 12px 6px;
            border: none;
            background: transparent;
            color: #90e0ef;
            font-size: 15px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-appearance: none;
        }
        .mode-btn.active {
            background: linear-gradient(135deg, #e63946, #f4a261);
            color: #fff;
            box-shadow: 0 4px 15px rgba(230,57,70,0.4);
        }
        
        .status-bar {
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            background: rgba(0,180,216,0.15);
            margin: 10px 0;
            font-size: 15px;
            color: #90e0ef;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.5;
        }
        .status-bar.error { background: rgba(231,76,60,0.2); color: #ff9f9f; }
        .status-bar.success { background: rgba(0,184,148,0.2); color: #00cec9; }
        .status-bar.loading { background: rgba(255,193,7,0.15); color: #ffd166; }
        
        .mic-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 16px 0;
        }
        .mic-btn {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid rgba(230,57,70,0.3);
            background: linear-gradient(135deg, #e63946, #d62828);
            color: #fff;
            font-size: 44px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(230,57,70,0.5);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-appearance: none;
        }
        .mic-btn:active { transform: scale(0.92); }
        .mic-btn.listening {
            animation: pulse-ring 1.5s infinite;
            background: linear-gradient(135deg, #ff6b6b, #e63946);
        }
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(230,57,70,0.7); }
            70% { box-shadow: 0 0 0 25px rgba(230,57,70,0); }
            100% { box-shadow: 0 0 0 0 rgba(230,57,70,0); }
        }
        .mic-label {
            margin-top: 10px;
            font-size: 16px;
            font-weight: 700;
            color: #ffd166;
        }
        
        .input-section {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-label {
            font-size: 13px;
            color: #ffd166;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .text-input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.2);
            color: #fff;
            font-size: 20px;
            font-family: inherit;
            outline: none;
            margin-bottom: 10px;
            -webkit-appearance: none;
        }
        .text-input:focus { border-color: #00b4d8; }
        .text-input::placeholder { color: rgba(255,255,255,0.35); }
        .translate-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            -webkit-appearance: none;
        }
        .translate-btn:active { transform: scale(0.98); opacity: 0.9; }
        .translate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-box {
            background: rgba(255,255,255,0.07);
            border-radius: 16px;
            padding: 16px;
            margin: 10px 0;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .result-label {
            font-size: 12px;
            color: #90e0ef;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .result-text {
            font-size: 24px;
            font-weight: 700;
            line-height: 1.5;
            color: #fff;
            min-height: 36px;
            word-break: break-word;
        }
        .result-text.highlight {
            color: #00f5d4;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(0,245,212,0.3);
        }
        
        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .action-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-appearance: none;
        }
        .speak-btn {
            background: linear-gradient(135deg, #06d6a0, #118ab2);
            color: #fff;
            box-shadow: 0 4px 15px rgba(6,214,160,0.3);
        }
        .speak-btn:active { transform: scale(0.96); }
        .clear-btn {
            background: rgba(255,255,255,0.1);
            color: #90e0ef;
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        .settings {
            background: rgba(255,255,255,0.04);
            border-radius: 14px;
            padding: 14px;
            margin: 12px 0;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 12px 0;
        }
        .setting-label { font-size: 15px; font-weight: 600; }
        .slider-wrap { display: flex; align-items: center; gap: 10px; }
        .slider-val { font-size: 14px; color: #00f5d4; min-width: 40px; text-align: right; }
        .slider {
            -webkit-appearance: none;
            width: 140px;
            height: 6px;
            border-radius: 3px;
            background: rgba(255,255,255,0.15);
            outline: none;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #e63946;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(230,57,70,0.5);
        }
        
        .quick-section { margin: 14px 0; }
        .quick-title {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd166;
            font-weight: 700;
        }
        .phrase-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .phrase-btn {
            padding: 12px 8px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
            -webkit-appearance: none;
        }
        .phrase-btn:active {
            background: rgba(230,57,70,0.3);
            border-color: #e63946;
            transform: scale(0.97);
        }
        
        .info-box {
            background: rgba(0,180,216,0.1);
            border: 1px solid rgba(0,180,216,0.25);
            border-radius: 12px;
            padding: 12px;
            margin: 10px 0;
            font-size: 13px;
            color: #90e0ef;
            line-height: 1.7;
        }
        
        .footer {
            text-align: center;
            padding: 16px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            line-height: 1.8;
        }
        
        @media (max-width: 400px) {
            .header h1 { font-size: 22px; }
            .result-text { font-size: 22px; }
            .result-text.highlight { font-size: 26px; }
            .mic-btn { width: 95px; height: 95px; font-size: 38px; }
            .phrase-btn { font-size: 14px; padding: 10px 6px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 語音翻譯助手</h1>
            <p>線上翻譯引擎 · 聽寫+翻譯+朗讀</p>
        </div>

        <!-- 模式切換 -->
        <div class="mode-switch">
            <button class="mode-btn active" data-mode="zh-en" onclick="switchMode('zh-en')">
                🇨🇳 中文 → 🇺🇸 英文
            </button>
            <button class="mode-btn" data-mode="en-zh" onclick="switchMode('en-zh')">
                🇺🇸 英文 → 🇨🇳 中文
            </button>
        </div>

        <!-- 狀態列 -->
        <div class="status-bar" id="statusBar">⏸️ 點擊麥克風說話，或打字輸入</div>

        <!-- 麥克風 -->
        <div class="mic-section">
            <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎙️</button>
            <div class="mic-label" id="micLabel">點擊開始說話</div>
        </div>

        <!-- 文字輸入 -->
        <div class="input-section">
            <div class="input-label">✏️ 文字輸入（語音不可用時使用）</div>
            <input type="text" class="text-input" id="textInput" 
                placeholder="請輸入要翻譯的文字..."
                onkeydown="if(event.key==='Enter')doTranslate()">
            <button class="translate-btn" id="transBtn" onclick="doTranslate()">🔄 翻譯</button>
        </div>

        <!-- 原文 -->
        <div class="result-box">
            <div class="result-label" id="sourceLabel">📢 您說的話</div>
            <div class="result-text" id="sourceText">...</div>
        </div>

        <!-- 翻譯結果 -->
        <div class="result-box">
            <div class="result-label" id="transLabel">🌐 翻譯結果</div>
            <div class="result-text highlight" id="transText">...</div>
            <div class="action-btns">
                <button class="action-btn speak-btn" onclick="speakResult()">
                    🔊 朗讀翻譯
                </button>
                <button class="action-btn clear-btn" onclick="clearAll()">
                    🗑️ 清除
                </button>
            </div>
        </div>

        <!-- 設定 -->
        <div class="settings">
            <div class="setting-row">
                <span class="setting-label">🔊 音量</span>
                <div class="slider-wrap">
                    <input type="range" class="slider" id="volSlider" min="0" max="100" value="100" oninput="updateVol(this.value)">
                    <span class="slider-val" id="volVal">100%</span>
                </div>
            </div>
            <div class="setting-row">
                <span class="setting-label">⚡ 語速</span>
                <div class="slider-wrap">
                    <input type="range" class="slider" id="rateSlider" min="5" max="15" value="10" oninput="updateRate(this.value)">
                    <span class="slider-val" id="rateVal">正常</span>
                </div>
            </div>
        </div>

        <!-- 常用短語 -->
        <div class="quick-section">
            <div class="quick-title">📌 常用旅遊短語（點擊直接翻譯+朗讀）</div>
            <div class="phrase-grid" id="phraseGrid"></div>
        </div>

        <!-- 使用說明 -->
        <div class="info-box">
            <strong>💡 使用說明：</strong><br>
            ① 選擇翻譯方向（中文↔英文）<br>
            ② 點擊紅色麥克風說話，或打字輸入<br>
            ③ 系統自動連線 MyMemory 翻譯引擎<br>
            ④ 點「🔊 朗讀翻譯」大聲播放<br><br>
            <strong>⚠️ 注意：</strong>翻譯需要網路連線。語音辨識需 HTTPS。
        </div>

        <div class="footer">
            翻譯引擎：MyMemory API（免費）<br>
            語音辨識需 HTTPS + 麥克風權限
        </div>
    </div>

    <script>
        // ===================== 常用短語 =====================
        const zhPhrases = [
            "你好", "謝謝", "對不起", "請問", "多少錢",
            "廁所在哪裡", "我要這個", "請幫助我", "我要去機場",
            "我生病了", "我不明白", "請說慢一點", "再見",
            "早安", "我要買單", "這裡可以拍照嗎", "我迷路了",
            "附近有餐廳嗎", "可以刷卡嗎", "這裡有WiFi嗎",
            "我的手機沒電了", "有充電器嗎", "我要退房",
            "計程車", "醫院", "警察局", "藥局", "救命"
        ];
        const enPhrases = [
            "Hello", "Thank you", "Sorry", "Excuse me", "How much is this?",
            "Where is the restroom?", "I want this", "Please help me",
            "I want to go to the airport", "I'm sick", "I don't understand",
            "Please speak slowly", "Goodbye", "Good morning",
            "Check, please", "Can I take photos here?", "I'm lost",
            "Are there restaurants nearby?", "Can I pay by card?",
            "Is there WiFi here?", "My phone is out of battery",
            "Do you have a charger?", "I want to check out",
            "Taxi", "Hospital", "Police station", "Pharmacy", "Help!"
        ];

        // ===================== 狀態 =====================
        let mode = 'zh-en';
        let listening = false;
        let recog = null;
        let vol = 1.0;
        let rate = 1.0;
        let speechOK = false;
        let isTranslating = false;

        // ===================== 初始化 =====================
        function init() {
            checkSpeech();
            initRecog();
            renderPhrases();
            updateUI();
        }

        function checkSpeech() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            speechOK = !!SR;
            if (!speechOK) {
                setStatus('⚠️ 瀏覽器不支援語音，請使用文字輸入', 'error');
                document.getElementById('micBtn').style.opacity = '0.4';
            }
        }

        function setStatus(msg, type) {
            const el = document.getElementById('statusBar');
            el.textContent = msg;
            el.className = 'status-bar' + (type ? ' ' + type : '');
        }

        // ===================== 語音辨識 =====================
        function initRecog() {
            if (!speechOK) return;
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            recog = new SR();
            recog.continuous = true;
            recog.interimResults = true;

            recog.onstart = () => {
                listening = true;
                document.getElementById('micBtn').classList.add('listening');
                document.getElementById('micLabel').textContent = '🔴 正在聆聽...';
                setStatus('🎙️ 請說話...');
            };

            recog.onresult = (e) => {
                let final = '', interim = '';
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    const t = e.results[i][0].transcript;
                    if (e.results[i].isFinal) final += t;
                    else interim += t;
                }
                const txt = final || interim;
                if (txt) {
                    document.getElementById('sourceText').textContent = txt;
                    if (final) translateOnline(final);
                }
            };

            recog.onerror = (e) => {
                console.log('Speech error:', e.error);
                if (e.error === 'service-not-allowed' || e.error === 'not-allowed') {
                    setStatus('❌ 語音被瀏覽器封鎖，請改用文字輸入', 'error');
                    speechOK = false;
                    document.getElementById('micBtn').style.opacity = '0.4';
                } else if (e.error === 'no-speech') {
                    setStatus('沒有偵測到語音');
                } else if (e.error === 'network') {
                    setStatus('網路問題，請檢查連線', 'error');
            } else if (e.error !== 'aborted') {
                    setStatus('語音錯誤: ' + e.error + '，請用文字輸入', 'error');
                }
                stopMic();
            };

            recog.onend = () => {
                if (listening && speechOK) {
                    try { recog.start(); } catch(e) {}
                } else {
                    stopMic();
                }
            };
        }

        function toggleMic() {
            if (!speechOK) {
                setStatus('❌ 語音不可用，請使用下方文字輸入', 'error');
                return;
            }
            if (listening) {
                stopMic();
            } else {
                startMic();
            }
        }

        function startMic() {
            try {
                recog.lang = mode === 'zh-en' ? 'zh-TW' : 'en-US';
                recog.start();
            } catch (e) {
                setStatus('無法啟動麥克風: ' + e.message, 'error');
            }
        }

        function stopMic() {
            listening = false;
            try { recog.stop(); } catch(e) {}
            document.getElementById('micBtn').classList.remove('listening');
            document.getElementById('micLabel').textContent = '點擊開始說話';
        }

        // ===================== 線上翻譯 =====================
        async function translateOnline(text) {
            if (isTranslating) return;
            isTranslating = true;
            document.getElementById('transBtn').disabled = true;
            setStatus('🌐 正在連線翻譯引擎...', 'loading');

            const langpair = mode === 'zh-en' ? 'zh-CN|en' : 'en|zh-CN';
            const url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=' + langpair;

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.responseStatus === 200) {
                    document.getElementById('transText').textContent = data.responseData.translatedText;
                    setStatus('✅ 翻譯完成', 'success');
                } else {
                    document.getElementById('transText').textContent = '【翻譯失敗】' + (data.responseDetails || '請檢查網路');
                    setStatus('❌ 翻譯失敗: ' + (data.responseDetails || '未知錯誤'), 'error');
                }
            } catch (err) {
                console.error(err);
                document.getElementById('transText').textContent = '【翻譯失敗】無法連線翻譯引擎，請檢查網路連線';
                setStatus('❌ 無法連線翻譯引擎，請檢查網路', 'error');
            } finally {
                isTranslating = false;
                document.getElementById('transBtn').disabled = false;
                setTimeout(() => {
                    if (!isTranslating) setStatus('⏸️ 準備就緒');
                }, 3000);
            }
        }

        // ===================== 文字翻譯入口 =====================
        function doTranslate() {
            const input = document.getElementById('textInput').value.trim();
            if (!input) {
                setStatus('⚠️ 請先輸入文字', 'error');
                return;
            }
            document.getElementById('sourceText').textContent = input;
            translateOnline(input);
            document.getElementById('textInput').value = '';
        }

        // ===================== 朗讀 =====================
        function speakResult() {
            const text = document.getElementById('transText').textContent;
            if (!text || text === '...' || text.startsWith('【')) {
                setStatus('⚠️ 沒有有效內容可朗讀', 'error');
                return;
            }

            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = mode === 'zh-en' ? 'en-US' : 'zh-TW';
            u.volume = vol;
            u.rate = rate;
            u.pitch = 1;

            const voices = window.speechSynthesis.getVoices();
            if (voices.length) {
                const tl = mode === 'zh-en' ? 'en' : 'zh';
                const v = voices.find(vc => vc.lang.toLowerCase().startsWith(tl));
                if (v) u.voice = v;
            }

            u.onstart = () => setStatus('🔊 正在朗讀...');
            u.onend = () => setStatus('✅ 朗讀完成', 'success');
            u.onerror = () => setStatus('朗讀失敗', 'error');

            window.speechSynthesis.speak(u);
        }

        // ===================== 模式切換 =====================
        function switchMode(newMode) {
            mode = newMode;
            if (listening) stopMic();
            updateUI();
            clearAll();
        }

        function updateUI() {
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === mode);
            });
            if (mode === 'zh-en') {
                document.getElementById('sourceLabel').textContent = '📢 您說的話（中文）';
                document.getElementById('transLabel').textContent = '🌐 翻譯結果（英文）';
                document.getElementById('textInput').placeholder = '請輸入中文...';
            } else {
                document.getElementById('sourceLabel').textContent = '📢 You said (English)';
                document.getElementById('transLabel').textContent = '🌐 Translation (Chinese)';
                document.getElementById('textInput').placeholder = 'Type English here...';
            }
            renderPhrases();
        }

        // ===================== 常用短語 =====================
        function renderPhrases() {
            const grid = document.getElementById('phraseGrid');
            grid.innerHTML = '';
            const list = mode === 'zh-en' ? zhPhrases : enPhrases;

            list.forEach(txt => {
                const btn = document.createElement('button');
                btn.className = 'phrase-btn';
                btn.textContent = txt;
                btn.onclick = () => {
                    document.getElementById('sourceText').textContent = txt;
                    translateOnline(txt);
                };
                grid.appendChild(btn);
            });
        }

        // ===================== 設定 =====================
        function updateVol(v) {
            vol = v / 100;
            document.getElementById('volVal').textContent = v + '%';
        }
        function updateRate(v) {
            rate = v / 10;
            const labels = {5:'很慢', 6:'慢', 7:'稍慢', 8:'偏慢', 9:'略慢', 10:'正常', 11:'略快', 12:'偏快', 13:'稍快', 14:'快', 15:'很快'};
            document.getElementById('rateVal').textContent = labels[v] || '正常';
        }

        // ===================== 清除 =====================
        function clearAll() {
            document.getElementById('sourceText').textContent = '...';
            document.getElementById('transText').textContent = '...';
            document.getElementById('textInput').value = '';
            setStatus('🗑️ 已清除');
            setTimeout(() => setStatus('⏸️ 準備就緒'), 1500);
        }

        // 預載語音
        if (window.speechSynthesis) {
            window.speechSynthesis.getVoices();
            if (window.speechSynthesis.onvoiceschanged !== undefined) {
                window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
            }
        }

        // 啟動
        init();
    </script>
</body>
</html>
